services:
  db:
    image: postgres:16-alpine
    container_name: zoiko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoiko
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zoiko
    volumes:
      - zoiko_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoiko -d zoiko"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ${SERVER_IMAGE:-ghcr.io/zoikotime/zoiko_meet/server:latest}
    container_name: zoiko-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zoiko:${POSTGRES_PASSWORD}@db:5432/zoiko}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      CORS_ORIGINS: ${CORS_ORIGINS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_MODEL: ${AI_MODEL}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - zoiko_uploads:/app/uploads
      - zoiko_recordings:/app/recordings

  client:
    image: ${CLIENT_IMAGE:-ghcr.io/zoikotime/zoiko_meet/client:latest}
    container_name: zoiko-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  zoiko_pg_data:
  zoiko_uploads:
  zoiko_recordings:
