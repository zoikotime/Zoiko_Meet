services:
  db:
    image: postgres:16-alpine
    container_name: zoiko-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zoiko
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zoiko_dev}
      POSTGRES_DB: zoiko
    volumes:
      - zoiko_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoiko -d zoiko"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: zoiko-server
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zoiko:${POSTGRES_PASSWORD:-zoiko_dev}@db:5432/zoiko}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@zoikomeet.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Zoiko Meet}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - zoiko_uploads:/app/uploads
      - zoiko_recordings:/app/recordings

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8001}
    container_name: zoiko-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  zoiko_pg_data:
  zoiko_uploads:
  zoiko_recordings:
