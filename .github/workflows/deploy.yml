name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ${{ github.repository }}/server
  IMAGE_CLIENT: ${{ github.repository }}/client
  REGION: europe-west1
  SERVICE: zoiko-meet-git

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        working-directory: client
        run: npm ci
      - name: Lint client
        working-directory: client
        continue-on-error: true
        run: npm run lint --if-present
      - name: Build client smoke
        working-directory: client
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8001' }}
        run: npm run build
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install server deps
        working-directory: server
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import-check server
        working-directory: server
        run: python -c "from app.main import app; print('ok')"

  build-and-push:
    name: Build and Push Images
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_SERVER }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_CLIENT }}:latest
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE || 'http://localhost:8001' }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_SERVER }}:latest
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
      - name: Health check
        run: |
          URL="https://zoiko-meet-git-722985113446.europe-west1.run.app/api/health"
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "$URL" > /dev/null; then
              echo "Healthy!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          exit 1
