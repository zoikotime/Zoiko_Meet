name: CI/CD Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: europe-west1-docker.pkg.dev/project-4b10b0ae-f69d-47e2-90d/zoiko-meet
  REGION: europe-west1

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/server:latest
      - name: Build and push client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/client:latest
          # The client is a static SPA; VITE_API_BASE is a build-time
          # constant. Without this, the deployed client tries to fetch
          # http://localhost:8080 from the user's browser → "failed to fetch".
          build-args: |
            VITE_API_BASE=${{ vars.VITE_API_BASE }}

  deploy-server:
    name: Deploy Server to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy server to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoiko-meet-git
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/server:latest
          # CORS_ORIGINS must include the deployed client's Cloud Run URL,
          # otherwise the browser blocks every API call from the SPA.
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
            FRONTEND_URL=${{ vars.FRONTEND_URL }}

  deploy-client:
    name: Deploy Client to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Deploy client to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: zoiko-meet-client
          region: ${{ env.REGION }}
          image: ${{ env.REGISTRY }}/client:latest
