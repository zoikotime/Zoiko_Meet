name: Release Desktop

# Build Zoiko connect desktop installers on tag push (vX.Y.Z) and publish
# them to a GitHub Release. electron-updater reads the published feed
# (latest.yml, latest-mac.yml, latest-linux.yml) to deliver in-app updates.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build + publish installer
        env:
          # electron-builder uses GH_TOKEN (or GITHUB_TOKEN) to upload to the
          # release matching the current tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point the bundled client at your production API here.
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8001' }}
        run: npm run electron:dist
